name: Validate website
on:
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python tools/site.py build
      - run: python tools/site.py validate
      - run: python tools/site.py test
      - run: find src/assets/js -name '*.js' -print0 | xargs -0 -n1 node --check
      - run: ruff check tools tests
